services:
    _defaults:
        autowire: true
        autoconfigure: true

    # ── Core Services ───────────────────────────────────────────────────────────
    # Controllers registered here: MemoryApiController, CsrfController, EstimateCostApiController
    # Chat-specific controllers (ChatApiController, ConversationApiController, ResetController) are in synapse-chat/config/chat.yaml
    ArnaudMoncondhuy\SynapseCore\Controller\Api\:
        resource: '../src/Controller/Api/'
        tags: ['controller.service_arguments']

    ArnaudMoncondhuy\SynapseCore\Manager\:
        resource: '../src/Manager/'

    ArnaudMoncondhuy\SynapseCore\Accounting\:
        resource: '../src/Accounting/'

    ArnaudMoncondhuy\SynapseCore\Accounting\TokenAccountingService:
        arguments:
            $referenceCurrency: '%synapse.token_tracking.reference_currency%'
            $currencyRates: '%synapse.token_tracking.currency_rates%'

    ArnaudMoncondhuy\SynapseCore\Command\:
        resource: '../src/Command/'

    ArnaudMoncondhuy\SynapseCore\Timing\:
        resource: '../src/Timing/'

    # ── Compatibility alias : TokenUsageRepository → LlmCallRepository ───────
    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseTokenUsageRepository:
        alias: ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseLlmCallRepository

    # ── Route Loader ─────────────────────────────────────────────────────────
    # Permet: resource: . / type: synapse dans routes.yaml (charge Admin + Chat auto)
    ArnaudMoncondhuy\SynapseCore\Routing\SynapseRoutesLoader:
        tags:
            - { name: routing.loader }

    ArnaudMoncondhuy\SynapseCore\MessageHandler\:
        resource: '../src/MessageHandler/'

    # ── Infra : Google Vertex AI ──────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Client\GeminiAuthService:
        # $serviceAccountJsonPath defaults to null — credentials injected at runtime from DB
        # Keep this declaration for potential fallback to YAML file path in future use

    ArnaudMoncondhuy\SynapseCore\Client\GeminiClient:
        arguments:
            $httpClient: '@http_client'
            $geminiAuthService: '@ArnaudMoncondhuy\SynapseCore\Client\GeminiAuthService'
            $configProvider: '@ArnaudMoncondhuy\SynapseCore\Contract\ConfigProviderInterface'
            $capabilityRegistry: '@ArnaudMoncondhuy\SynapseCore\Engine\ModelCapabilityRegistry'
        tags:
            - { name: synapse.llm_client }

    # ── Infra : OVH AI Endpoints ──────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Client\OvhAiClient:
        arguments:
            $httpClient: '@http_client'
            $configProvider: '@ArnaudMoncondhuy\SynapseCore\Contract\ConfigProviderInterface'
            $capabilityRegistry: '@ArnaudMoncondhuy\SynapseCore\Engine\ModelCapabilityRegistry'
        tags:
            - { name: synapse.llm_client }

    # ── Registre des clients LLM ──────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Engine\LlmClientRegistry:
        arguments:
            $clients: !tagged_iterator synapse.llm_client
            $configProvider: '@ArnaudMoncondhuy\SynapseCore\Contract\ConfigProviderInterface'
            $defaultProvider: 'gemini'

    # ── Registre des capacités par modèle ────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Engine\ModelCapabilityRegistry: ~

    # ── Chat (estimation tokens, troncature contexte) ───────────────────────────
    ArnaudMoncondhuy\SynapseCore\Engine\ContextTruncationService: ~

    # ── Registre des outils ──────────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Engine\ToolRegistry:
        arguments:
            $tools: !tagged_iterator synapse.tool

    # ── Registre des splitters (Chunking) ────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Chunking\TextSplitterRegistry:
        arguments:
            $splitters: !tagged_iterator { tag: synapse.text_splitter, index_by: alias }

    # ── Registre des Vector Stores ───────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\VectorStore\VectorStoreRegistry:
        arguments:
            $vectorStores: !tagged_iterator { tag: synapse.vector_store, index_by: alias }

    ArnaudMoncondhuy\SynapseCore\VectorStore\DynamicVectorStore:
        arguments:
            $registry: '@ArnaudMoncondhuy\SynapseCore\VectorStore\VectorStoreRegistry'
            $configRepository: '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseConfigRepository'


    # ── Default implementations (can be overridden by user) ──────────────────
    ArnaudMoncondhuy\SynapseCore\PresetValidator:
        arguments:
            $providerRepo: '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseProviderRepository'
            $capabilityRegistry: '@ArnaudMoncondhuy\SynapseCore\Engine\ModelCapabilityRegistry'
            $em: '@doctrine.orm.entity_manager'

    ArnaudMoncondhuy\SynapseCore\DatabaseConfigProvider:
        arguments:
            $presetRepo: '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseModelPresetRepository'
            $globalConfigRepo: '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseConfigRepository'
            $providerRepo: '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseProviderRepository'
            $presetValidator: '@ArnaudMoncondhuy\SynapseCore\PresetValidator'
            $encryptionService: '@?ArnaudMoncondhuy\SynapseCore\Contract\EncryptionServiceInterface'

    ArnaudMoncondhuy\SynapseCore\Impl\DefaultContextProvider: ~

    ArnaudMoncondhuy\SynapseCore\Context\UserAwareContextProvider:
        arguments:
            $language: '%synapse.context.language%'

    ArnaudMoncondhuy\SynapseCore\Security\DefaultPermissionChecker:
        arguments:
            $adminRole: '%synapse.security.admin_role%'

    ArnaudMoncondhuy\SynapseCore\Formatter\MessageFormatter:
        arguments:
            $encryptionService: '@?ArnaudMoncondhuy\SynapseCore\Contract\EncryptionServiceInterface'

    # ── Interface aliases (use default implementations) ───────────────────────
    ArnaudMoncondhuy\SynapseCore\Contract\ConfigProviderInterface:
        alias: ArnaudMoncondhuy\SynapseCore\DatabaseConfigProvider

    ArnaudMoncondhuy\SynapseCore\Contract\ContextProviderInterface:
        alias: ArnaudMoncondhuy\SynapseCore\Impl\DefaultContextProvider

    ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface:
        alias: ArnaudMoncondhuy\SynapseCore\Security\DefaultPermissionChecker

    ArnaudMoncondhuy\SynapseCore\Contract\MessageFormatterInterface:
        alias: ArnaudMoncondhuy\SynapseCore\Formatter\MessageFormatter

    # ── Logic ─────────────────────────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\VectorStore\NullVectorStore:
        tags: [{ name: synapse.vector_store, alias: null }]
    ArnaudMoncondhuy\SynapseCore\VectorStore\InMemoryVectorStore:
        tags: [{ name: synapse.vector_store, alias: in_memory }]
    ArnaudMoncondhuy\SynapseCore\VectorStore\DoctrineVectorStore:
        arguments:
            $repository: '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseVectorMemoryRepository'
            $logger: '@?logger'
        tags: [{ name: synapse.vector_store, alias: doctrine }]

    ArnaudMoncondhuy\SynapseCore\Contract\VectorStoreInterface:
        alias: ArnaudMoncondhuy\SynapseCore\VectorStore\DynamicVectorStore

    ArnaudMoncondhuy\SynapseCore\Chunking\RecursiveTextSplitter:
        tags: [{ name: synapse.text_splitter, alias: recursive }]
    ArnaudMoncondhuy\SynapseCore\Chunking\FixedSizeTextSplitter:
        tags: [{ name: synapse.text_splitter, alias: fixed }]

    ArnaudMoncondhuy\SynapseCore\Contract\TextSplitterInterface:
        alias: ArnaudMoncondhuy\SynapseCore\Chunking\RecursiveTextSplitter

    ArnaudMoncondhuy\SynapseCore\ToneRegistry:
        arguments:
            $repository: '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseToneRepository'

    ArnaudMoncondhuy\SynapseCore\AgentRegistry:
        arguments:
            $repository: '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseAgentRepository'

    ArnaudMoncondhuy\SynapseCore\Engine\PromptBuilder:
        arguments:
            $toneRegistry: '@ArnaudMoncondhuy\SynapseCore\ToneRegistry'
            $configProvider: '@ArnaudMoncondhuy\SynapseCore\Contract\ConfigProviderInterface'

    # ── DataFixtures (optionnel — requiert doctrine/doctrine-fixtures-bundle) ───
    # Note: Les fixtures sont découvertes automatiquement par Doctrine Fixtures
    # Pas besoin de les enregistrer comme services pour éviter les erreurs de compilation
    # dans les environnements prod sans DataFixtures installées.

    # ── Main service ──────────────────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Engine\ChatService:
        arguments:
            $llmRegistry: '@ArnaudMoncondhuy\SynapseCore\Engine\LlmClientRegistry'
            $configProvider: '@ArnaudMoncondhuy\SynapseCore\Contract\ConfigProviderInterface'
            $dispatcher: '@event_dispatcher'

    ArnaudMoncondhuy\SynapseCore\Service\EmbeddingService:
        arguments:
            $clients: !tagged_iterator synapse.llm_client

    ArnaudMoncondhuy\SynapseCore\Memory\MemoryManager:
        arguments:
            $em: '@doctrine.orm.entity_manager'

    # ── Agents ────────────────────────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Agent\PresetValidator\PresetValidatorAgent:
        autowire: true
        autoconfigure: true

    ArnaudMoncondhuy\SynapseCore\Agent\SynapseAgentBuilder:
        autowire: true
        autoconfigure: true

    ArnaudMoncondhuy\SynapseCore\Service\ChunkingService: ~

    # ── Repositories (required by core services) ──────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseLlmCallRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseSpendingLimitRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseSpendingLimitLogRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Accounting\SpendingLimitChecker:
        arguments:
            $configRepo: '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseConfigRepository'
            $slidingDayHours: '%synapse.token_tracking.sliding_day_hours%'

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseModelPresetRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseConfigRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseProviderRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseModelRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseDebugLogRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseVectorMemoryRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseToneRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseAgentRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    # ── Debug Logging ─────────────────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Storage\Logger\MonologDebugLogger:
        arguments:
            $logger: '@logger'
        tags:
            - { name: 'monolog.logger', channel: 'synapse_debug' }
        public: false

    # Default alias (uses Monolog for lightweight payloads)
    ArnaudMoncondhuy\SynapseCore\Contract\SynapseDebugLoggerInterface:
        alias: ArnaudMoncondhuy\SynapseCore\Storage\Logger\MonologDebugLogger

    # ── Attachment Storage ────────────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Service\AttachmentStorageService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseMessageAttachmentRepository:
        arguments:
            $registry: '@doctrine'
        tags: ['doctrine.repository_service']

    ArnaudMoncondhuy\SynapseCore\Event\AttachmentRemovalSubscriber:
        autowire: true
        autoconfigure: true
        public: false

    # ── Event Subscribers ──────────────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Event\ContextBuilderSubscriber:
        autowire: true
        autoconfigure: true
        public: false

    ArnaudMoncondhuy\SynapseCore\Event\ToolExecutionSubscriber:
        arguments:
            $toolRegistry: '@ArnaudMoncondhuy\SynapseCore\Engine\ToolRegistry'
        autowire: true
        autoconfigure: true
        public: false

    ArnaudMoncondhuy\SynapseCore\Event\DebugLogSubscriber:
        autowire: true
        autoconfigure: true
        public: false

    ArnaudMoncondhuy\SynapseCore\Event\MemoryContextSubscriber:
        autowire: true
        autoconfigure: true
        public: false

    # ── Memory Tools ─────────────────────────────────────────────────────────
    ArnaudMoncondhuy\SynapseCore\Memory\Tool\ProposeMemoryTool:
        tags: [{ name: synapse.tool }]

